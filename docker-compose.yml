version: '3.8'

services:

  # --- Container do Banco de Dados ---
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: unidades_conservacao
    ports:
      - "3306:3306"
    volumes:
      - ./database/unidades_conservacao.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql

  # --- Container do PHP + Apache ---
  php:
    build: .
    restart: always
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

volumes:
  db_data:
